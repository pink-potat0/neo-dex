<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>NEO DEX | Landing</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="./assets/js/tailwind-config.js"></script>
<script src="./assets/js/theme.js"></script>
<link rel="stylesheet" href="./assets/css/shared.css"/>
<link rel="icon" type="image/png" href="./favicon.png"/>
<style>
body.page-landing {
  background:
    linear-gradient(135deg, rgba(155, 77, 255, 0.2), transparent 26%),
    linear-gradient(315deg, rgba(61, 231, 196, 0.18), transparent 24%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0)),
    #f5f0ff;
  color: #111111;
}

body.page-landing::before {
  top: 5.5rem;
  right: 5vw;
  width: min(34vw, 22rem);
  height: min(34vw, 22rem);
  border: 18px solid rgba(155, 77, 255, 0.18);
  background: none;
  transform: rotate(10deg);
  opacity: 0.9;
}

body.page-landing::after {
  left: 4vw;
  bottom: 8vh;
  width: min(28vw, 16rem);
  height: min(22vw, 12rem);
  border: none;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(61, 231, 196, 0.18) 0 16px,
      transparent 16px 32px
    );
  box-shadow: none;
  transform: rotate(-8deg);
  opacity: 0.8;
}

body.page-landing .landing-grid-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -2;
  opacity: 0.95;
  background-image:
    linear-gradient(rgba(17, 17, 17, 0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(17, 17, 17, 0.12) 1px, transparent 1px),
    linear-gradient(rgba(155, 77, 255, 0.12) 2px, transparent 2px),
    linear-gradient(90deg, rgba(155, 77, 255, 0.12) 2px, transparent 2px);
  background-size: 38px 38px, 38px 38px, 190px 190px, 190px 190px;
  animation: landingGridDrift 14s linear infinite;
}

.landing-panel {
  position: relative;
  overflow: hidden;
  background-image:
    linear-gradient(135deg, rgba(255, 255, 255, 0.26), transparent 40%);
}

.landing-hero-inner {
  position: relative;
  z-index: 1;
}

.landing-panel::before {
  content: "";
  position: absolute;
  inset: auto 1.25rem 1.25rem auto;
  width: 6.5rem;
  height: 6.5rem;
  border: 6px solid #9b4dff;
  opacity: 0.2;
}

.landing-panel::after {
  content: "";
  position: absolute;
  top: 1.25rem;
  left: 1.25rem;
  width: 4.5rem;
  height: 4.5rem;
  background: #3de7c4;
  opacity: 0.18;
}

.landing-cube {
  position: absolute;
  z-index: 0;
  pointer-events: none;
}

.landing-cube-left {
  top: 0.8rem;
  left: -0.55rem;
  width: 5.5rem;
  height: 5.5rem;
  background: rgba(61, 231, 196, 0.18);
}

.landing-cube-right {
  right: 1rem;
  bottom: 1rem;
  width: 8.5rem;
  height: 8.5rem;
  border: 6px solid rgba(155, 77, 255, 0.34);
}

html.dark body.page-landing {
  background:
    radial-gradient(1200px 620px at 84% -12%, rgba(155, 77, 255, 0.2), transparent 64%),
    radial-gradient(920px 560px at -10% 112%, rgba(61, 245, 196, 0.14), transparent 62%),
    #0b0f18;
  color: #e8edff;
}

html.dark body.page-landing::before {
  border-color: rgba(155, 77, 255, 0.45);
}

html.dark body.page-landing::after {
  background:
    repeating-linear-gradient(
      0deg,
      rgba(61, 231, 196, 0.18) 0 16px,
      transparent 16px 32px
    );
}

html.dark body.page-landing .landing-grid-bg {
  background-image:
    linear-gradient(rgba(232, 237, 255, 0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232, 237, 255, 0.07) 1px, transparent 1px),
    linear-gradient(rgba(155, 77, 255, 0.2) 2px, transparent 2px),
    linear-gradient(90deg, rgba(155, 77, 255, 0.2) 2px, transparent 2px);
}

html.dark .landing-panel::before {
  border-color: #9b4dff;
}

html.dark .landing-panel::after {
  background: #3de7c4;
}

html.dark .landing-cube-left {
  background: rgba(61, 231, 196, 0.16);
}

html.dark .landing-cube-right {
  border-color: rgba(155, 77, 255, 0.4);
}

.landing-footer {
  color: rgba(17, 17, 17, 0.72);
}

html.dark .landing-footer {
  color: rgba(243, 239, 227, 0.74);
}

@keyframes landingGridDrift {
  from {
    transform: translate3d(0, 0, 0);
  }
  to {
    transform: translate3d(-44px, -44px, 0);
  }
}

@media (max-width: 767px) {
  body.page-landing::before {
    top: 4.75rem;
    right: -1rem;
    width: 10rem;
    height: 10rem;
    border-width: 12px;
  }

  body.page-landing::after {
    left: -1rem;
    bottom: 6rem;
    width: 8rem;
    height: 6rem;
  }

  .landing-grid-bg {
    background-size: 30px 30px, 30px 30px, 120px 120px, 120px 120px;
  }

  .landing-panel::before {
    width: 5rem;
    height: 5rem;
    border-width: 5px;
    right: 0.9rem;
    bottom: 0.9rem;
  }

  .landing-panel::after {
    width: 3.8rem;
    height: 3.8rem;
    top: 1rem;
    left: 0.9rem;
  }

  .landing-cube-left {
    top: 1rem;
    left: -0.15rem;
    width: 4.6rem;
    height: 4.6rem;
  }

  .landing-cube-right {
    right: 0.8rem;
    bottom: 1.1rem;
    width: 7rem;
    height: 7rem;
    border-width: 5px;
  }

  .landing-footer {
    font-size: 10px;
  }
}
</style>
</head>
<body class="page-landing flex min-h-[100dvh] flex-col overflow-x-hidden">
<div class="landing-grid-bg" aria-hidden="true"></div>
<header class="mx-auto flex w-full max-w-7xl items-center justify-between px-4 pt-[calc(1.25rem+env(safe-area-inset-top,0px))] sm:px-6 md:px-8">
<div class="border-4 border-black bg-[#111111] px-3 py-2 font-['Archivo_Black'] text-sm uppercase tracking-[0.18em] text-[#f3efe3] shadow-[4px_4px_0_0_#000] dark:border-white dark:bg-[#f3efe3] dark:text-[#111111] dark:shadow-[4px_4px_0_0_#f3efe3]">NEO DEX</div>
<button type="button" id="theme-toggle" class="material-symbols-outlined border-4 border-black bg-white p-2 text-black shadow-[4px_4px_0_0_#000] hover:translate-x-px hover:translate-y-px hover:shadow-[2px_2px_0_0_#000] dark:border-white dark:bg-[#111111] dark:text-white dark:shadow-[4px_4px_0_0_#f3efe3]" aria-label="Toggle dark mode">dark_mode</button>
</header>
<main class="mx-auto flex min-h-0 w-full max-w-7xl flex-1 items-center justify-center px-4 pb-3 pt-4 sm:px-6 sm:pb-6 sm:pt-6 md:px-8">
<section class="w-full max-w-4xl">
<div class="landing-panel border-4 border-black bg-[#fff9ea] p-6 shadow-[10px_10px_0_0_#000] dark:border-white dark:bg-[#16191d] dark:shadow-[10px_10px_0_0_#f3efe3] sm:p-9 md:p-12">
<span class="landing-cube landing-cube-left" aria-hidden="true"></span>
<span class="landing-cube landing-cube-right" aria-hidden="true"></span>
<div class="landing-hero-inner">
<h1 class="max-w-3xl font-['Archivo_Black'] text-4xl uppercase leading-none tracking-[-0.07em] text-black dark:text-white sm:text-6xl md:text-7xl">NEO DEX</h1>
<p class="mt-5 max-w-2xl text-lg font-semibold leading-snug text-black dark:text-white sm:mt-6 sm:text-xl md:text-2xl">A fast, clean Solana toolkit for everyday onchain actions.</p>
<p class="mt-4 max-w-2xl text-[15px] leading-relaxed text-black/80 dark:text-white/80 sm:mt-5 sm:text-lg">Swap, send, bridge, and clean up dust from one place. NEO DEX is built to keep flows simple, wallet-first, and mobile-friendly.</p>
<div class="mt-6 flex flex-wrap gap-3 sm:mt-8">
<a href="/pages/portfolio.html" class="inline-flex min-h-[64px] items-center justify-center border-4 border-black bg-[#9b4dff] px-8 py-4 font-['Archivo_Black'] text-lg uppercase tracking-[0.18em] text-white shadow-[8px_8px_0_0_#000] transition-all hover:translate-x-px hover:translate-y-px hover:shadow-[5px_5px_0_0_#000] dark:border-white dark:bg-[#9b4dff] dark:text-white dark:shadow-[8px_8px_0_0_#f3efe3] dark:hover:shadow-[5px_5px_0_0_#f3efe3]">Enter</a>
</div>
</div>
</div>
</section>
</main>
<footer class="site-footer">&copy; pinkpotato 2026</footer>
</body>
</html>
