<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>NEO DEX | Bridge</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/tailwind-config.js"></script>
<script src="../assets/js/theme.js"></script>
<link rel="stylesheet" href="../assets/css/shared.css"/>
<link rel="icon" type="image/png" href="../favicon.png"/>
</head>
<body class="page-bridge neo-mobile-shell bg-surface text-on-surface">
<header class="neo-topbar fixed top-0 w-full border-b-4 border-black dark:border-white z-50 bg-white dark:bg-black/80 backdrop-blur-md shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex justify-between items-center px-6 h-20">
<a class="flex items-center gap-3" href="/">
<h1 class="text-2xl font-bold tracking-tighter text-black dark:text-white uppercase font-['Space_Grotesk']">NEO DEX</h1>
</a>
<div class="flex items-center gap-3 sm:gap-4">
<div class="hidden md:flex flex-wrap justify-end gap-4 lg:gap-6 mr-2">
<a class="text-black dark:text-white font-bold uppercase tracking-tight hover:translate-x-[2px] hover:translate-y-[2px] transition-all" href="/portfolio">Wallet</a>
<a class="text-black dark:text-white font-bold uppercase tracking-tight hover:translate-x-[2px] hover:translate-y-[2px] transition-all" href="/swap">Swap</a>
<a class="text-black dark:text-white font-bold uppercase tracking-tight hover:translate-x-[2px] hover:translate-y-[2px] transition-all" href="/send">Send</a>
<a class="text-[#3df5c4] font-bold uppercase tracking-tight" href="/bridge">Bridge</a>
</div>
<button type="button" id="wallet-connect" class="border-4 border-black bg-black px-3 py-2 text-xs font-bold uppercase tracking-tight text-white shadow-[3px_3px_0_0_#000] hover:translate-x-px hover:translate-y-px hover:shadow-none active:scale-95 sm:px-4 sm:text-sm">Connect</button>
<button type="button" id="theme-toggle" class="material-symbols-outlined text-black dark:text-white hover:translate-x-[2px] hover:translate-y-[2px] transition-all active:scale-95 duration-100" aria-label="Toggle dark mode">dark_mode</button>
</div>
</header>
<main class="neo-page-main mx-auto flex min-h-screen w-full max-w-7xl flex-col items-center px-4 pb-28 pt-[calc(8rem+env(safe-area-inset-top,0px))] md:px-8 md:pt-[calc(9rem+env(safe-area-inset-top,0px))]">
<div class="flex w-full max-w-[480px] flex-col items-center space-y-8 md:max-w-[680px]">
<!-- 1. Source / swap / destination — swap centered on circle midline -->
<section class="relative w-full px-2 sm:px-4" aria-label="Networks">
<div class="flex w-full items-start justify-between gap-2 sm:gap-4">
<button type="button" class="flex min-w-0 max-w-[42%] flex-1 flex-col items-center gap-2 text-center active:scale-[0.98] sm:max-w-none">
<span class="flex h-[5.5rem] w-[5.5rem] shrink-0 items-center justify-center rounded-full border-4 border-black bg-primary-container shadow-[4px_4px_0_0_#000] sm:h-[6.25rem] sm:w-[6.25rem]">
<img src="https://upload.wikimedia.org/wikipedia/en/b/b9/Solana_logo.png" class="h-12 w-12 rounded-full object-cover sm:h-14 sm:w-14" alt="Solana icon" referrerpolicy="no-referrer"/>
</span>
<span class="text-sm font-bold uppercase tracking-tight">Solana</span>
<span class="text-[9px] font-bold uppercase leading-tight text-outline sm:text-[10px]">Source chain</span>
</button>
<button id="bridge-destination-chain-btn" type="button" class="flex min-w-0 max-w-[42%] flex-1 flex-col items-center gap-2 text-center active:scale-[0.98] sm:max-w-none">
<span class="flex h-[5.5rem] w-[5.5rem] shrink-0 items-center justify-center rounded-full border-4 border-black bg-secondary-container shadow-[4px_4px_0_0_#000] sm:h-[6.25rem] sm:w-[6.25rem]">
<img id="bridge-destination-chain-icon" class="hidden h-12 w-12 rounded-full object-cover sm:h-14 sm:w-14" alt="Destination chain icon"/>
<span id="bridge-destination-chain-icon-fallback" class="material-symbols-outlined text-4xl text-on-secondary-container sm:text-5xl">layers</span>
</span>
<span id="bridge-destination-chain-label" class="text-sm font-bold uppercase tracking-tight">Select</span>
<span class="text-[9px] font-bold uppercase leading-tight text-outline sm:text-[10px]">Tap to change</span>
</button>
</div>
<button type="button" class="absolute left-1/2 top-[2.25rem] z-10 flex h-11 w-11 -translate-x-1/2 -translate-y-1/2 items-center justify-center rounded-full border-4 border-black bg-inverse-surface text-primary-container shadow-[3px_3px_0_0_#000] transition-shadow hover:shadow-[4px_5px_0_0_#000] active:scale-95 active:shadow-none sm:top-[2.75rem]" aria-label="Flip source and destination">
<span class="material-symbols-outlined text-xl font-bold">swap_horiz</span>
</button>
</section>
<!-- 2. Bridge card: title + presets, then amount + token -->
<section class="w-full border-4 border-black bg-surface-container-lowest p-5 neo-shadow md:p-6" aria-label="Bridge amount">
<div class="mb-4 flex flex-wrap items-start justify-between gap-3">
<span class="text-sm font-bold uppercase tracking-widest text-on-surface-variant">Bridge</span>
<div class="flex flex-wrap justify-end gap-2">
<button type="button" class="border-2 border-black bg-white px-3 py-1.5 text-xs font-bold uppercase tracking-tight hover:bg-primary-container" data-bridge-preset="0.1">0.1</button>
<button type="button" class="border-2 border-black bg-white px-3 py-1.5 text-xs font-bold uppercase tracking-tight hover:bg-primary-container" data-bridge-preset="0.5">0.5</button>
<button type="button" class="border-2 border-black bg-white px-3 py-1.5 text-xs font-bold uppercase tracking-tight hover:bg-primary-container" data-bridge-preset="1">1</button>
<button type="button" class="border-2 border-black bg-white px-3 py-1.5 text-xs font-bold uppercase tracking-tight hover:bg-primary-container" data-bridge-preset="10">10</button>
</div>
</div>
<div class="flex items-center gap-3 border-4 border-black bg-surface-container-low p-4 focus-within:border-primary md:gap-4 md:p-5">
<input id="bridge-amount" class="min-w-0 flex-1 border-none bg-transparent text-3xl font-bold outline-none ring-0 placeholder:text-outline-variant md:text-4xl" placeholder="0" type="text" inputmode="decimal" autocomplete="off"/>
<button type="button" class="flex shrink-0 items-center gap-2 border-2 border-black bg-white px-3 py-2 font-bold hover:bg-surface-container md:px-4 md:py-2.5">
<span class="material-symbols-outlined text-secondary">toll</span>
<span class="uppercase">SOL</span>
</button>
</div>
<div class="mt-4 grid gap-3">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant" for="bridge-to-address">Recipient address on destination chain</label>
<input id="bridge-to-address" class="w-full border-4 border-black bg-white px-3 py-3 text-xs font-bold tracking-tight text-black placeholder:text-outline focus:border-primary sm:text-sm" placeholder="Paste destination wallet address" type="text" autocomplete="off"/>
</div>
<div class="mt-4 space-y-1.5 border-t-2 border-dashed border-outline-variant pt-4 text-[10px] font-bold uppercase">
<p class="text-on-surface-variant">Powered by Relay</p>
<p id="bridge-status" class="pt-1 text-[10px] font-bold uppercase text-on-surface-variant"></p>
</div>
</section>
<!-- 3. Primary action -->
<button id="bridge-submit" type="button" class="w-full border-4 border-black bg-primary-container py-5 font-headline text-lg font-extrabold uppercase tracking-widest text-on-primary-container neo-shadow neo-shadow-hover transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none sm:text-xl">Connect wallet</button>
</div>
</main>
<footer class="site-footer">&copy; pinkpotato 2026</footer>
<div id="bridge-chain-modal" class="fixed inset-0 z-[120] hidden" aria-hidden="true">
<div class="absolute inset-0 bg-black/60 backdrop-blur-sm" data-bridge-chain-backdrop data-popup-backdrop></div>
<div class="relative flex min-h-full items-center justify-center p-4">
<div data-popup-panel class="w-full max-w-md border-4 border-black bg-surface-container-lowest neo-shadow">
<div class="flex items-center justify-between border-b-4 border-black px-4 py-3">
<h3 class="text-sm font-extrabold uppercase tracking-widest">Select destination chain</h3>
<button type="button" class="border-2 border-black bg-white px-2 py-1 text-xs font-bold uppercase" data-bridge-chain-close>Close</button>
</div>
<div class="p-4">
<input id="bridge-chain-search" class="w-full border-4 border-black bg-white px-3 py-3 text-sm font-bold uppercase tracking-tight text-black placeholder:text-outline" placeholder="Search chains..." type="text" autocomplete="off"/>
<p id="bridge-chain-help" class="mt-2 text-[10px] font-bold uppercase text-on-surface-variant">Top chains</p>
<div id="bridge-chain-list" class="mt-3 max-h-[320px] overflow-y-auto border-2 border-black bg-surface-container-low"></div>
</div>
</div>
</div>
</div>
<div id="bridge-toast-host" class="pointer-events-none fixed bottom-24 right-4 z-[140] flex w-[min(92vw,25rem)] flex-col gap-2"></div>
<script type="module" src="../src/bridge-main.js"></script>
<nav class="neo-bottom-nav fixed bottom-0 left-0 z-50 flex h-16 w-full justify-around border-t-4 border-black bg-white dark:border-white dark:bg-black md:hidden">
<a class="flex min-w-0 flex-1 flex-col items-center justify-center px-1 text-black opacity-70 hover:bg-[#3df5c4] hover:text-[#071a1f] dark:text-white" href="/portfolio">
<span class="material-symbols-outlined text-[22px]">wallet</span>
<span class="font-['Space_Grotesk'] text-[8px] font-bold uppercase leading-tight">Wallet</span>
</a>
<a class="flex min-w-0 flex-1 flex-col items-center justify-center px-1 text-black opacity-70 hover:bg-[#3df5c4] hover:text-[#071a1f] dark:text-white" href="/swap">
<span class="material-symbols-outlined text-[22px]">swap_calls</span>
<span class="font-['Space_Grotesk'] text-[8px] font-bold uppercase leading-tight">Swap</span>
</a>
<a class="flex min-w-0 flex-1 flex-col items-center justify-center px-1 text-black opacity-70 hover:bg-[#3df5c4] hover:text-[#071a1f] dark:text-white" href="/send">
<span class="material-symbols-outlined text-[22px]">send</span>
<span class="font-['Space_Grotesk'] text-[8px] font-bold uppercase leading-tight">Send</span>
</a>
<a class="flex min-w-0 flex-1 flex-col items-center justify-center border-x-2 border-black bg-[#9b4dff] px-1 text-white" href="/bridge">
<span class="material-symbols-outlined text-[22px]">hub</span>
<span class="font-['Space_Grotesk'] text-[8px] font-bold uppercase leading-tight">Bridge</span>
</a>
</nav>
</body>
</html>
